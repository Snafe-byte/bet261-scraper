<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Snafe-byte Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: #ffffff; padding: 20px; }
        .box { background-color: #16213e; padding: 20px; border-radius: 12px; max-width: 450px; margin: auto; border: 1px solid #0f3460; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; }
        button { background-color: #e94560; color: white; font-weight: bold; cursor: pointer; }
        #resultat { margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #0f3460; }
        .alerte { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Snafe-byte Analytics</h2>
        <select id="homeTeam"></select> vs <select id="awayTeam"></select>
        <input type="number" id="c1" placeholder="Cote 1" step="0.01">
        <button onclick="analyser()">Analyser le Risque</button>
        <div id="resultat">En attente d'analyse...</div>
    </div>

    <script>
        const teams = ["Liverpool", "London Reds", "Manchester Blue", "Brighton", "Brentford", "A. Villa", "Newcastle", "Everton", "Spurs", "West Ham", "Manchester Red", "Fulham", "London Blues", "C. Palace", "N. Forest", "Wolverhampton", "Burnley", "Bournemouth", "Leeds", "Sunderland"];
        teams.forEach(t => {
            document.getElementById('homeTeam').innerHTML += `<option>${t}</option>`;
            document.getElementById('awayTeam').innerHTML += `<option>${t}</option>`;
        });

        function analyser() {
            const c1 = parseFloat(document.getElementById('c1').value);
            const resDiv = document.getElementById('resultat');
            
            let message = "";
            if (c1 < 1.30) {
                message = "<span class='alerte'>⚠️ DANGER : Cote trop faible (< 1.30), risque élevé de nul ou défaite.</span><br>";
            }
            
            let score = (c1 < 1.40) ? "3-0 ou 3-1" : "1-1 ou 2-1";
            let buts = (c1 < 1.40) ? "Plus de 2.5 buts (Over)" : "Moins de 3.5 buts";

            resDiv.innerHTML = `${message}<strong>Score suggéré :</strong> ${score}<br><strong>Total de buts :</strong> ${buts}`;
        }
    </script>
</body>
</html>
